<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpatValue AI - Preview</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            hcNavy: '#002244',
            hcBlue: '#0A3B7A',
            hcGray: {
              50: '#F5F6F8', 100: '#E6E9ED', 200: '#C8CCD4',
              800: '#333D4D', 900: '#1A212B',
            }
          },
          fontFamily: {
            sans: ['"Pretendard"', '"Apple SD Gothic Neo"', '"Noto Sans KR"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Axios CDN 추가 -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    /* Skeleton Animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .skeleton {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="bg-hcGray-50 text-hcGray-900 font-sans h-screen overflow-hidden">
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const IconCalculator = () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="10" y2="10"/></svg>;
    const IconMapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const IconCoins = () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>;
    const IconArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const IconInfo = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const IconFileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
    const IconDollarSign = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
    const IconGlobe = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
    const IconSettings = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const IconDatabase = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>;
    const IconX = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const IconSave = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const IconRefresh = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>;

    // 미 국무부 Retail Price Index (워싱턴 D.C. = 100 기준) 구조화 JSON
    const STATE_DEPT_DATA_MOCK = {
      meta: {
        lastUpdated: '2026-04-01',
        version: '2026 Q2',
        sourceUrl: 'https://aoprals.state.gov/',
        notice: "본 지수는 미 국무부(U.S. State Dept.)의 Retail Price Index를 서울 기준으로 재가공하여 산출되었습니다."
      },
      indices: {
        '워싱턴 D.C.': 100.0,
        '서울': 115.0,
        '도쿄': 95.0,
        '런던': 135.0,
        '뉴욕': 140.0,
        '로스앤젤레스': 130.0,
        '시카고': 120.0,
        '베를린': 110.0,
        '부산': 105.0
      }
    };

    // 한국은행 API 연평균 환율 모의 결과
    const EXCHANGE_RATE_MOCK = {
      meta: {
        lastUpdated: '2026-01-01',
        source: 'e-나라지표 / 한국은행 ECOS',
        calcMethod: '직전년도(1/1~12/31) 일별 환율 산술 평균'
      },
      rates: {
        'USD': 1385.5,
        'GBP': 1720.0,
        'JPY': 9.15,
        'EUR': 1480.0,
        'KRW': 1.0
      }
    };

    const CURRENCY_MAP = {
      '뉴욕': 'USD', '로스앤젤레스': 'USD', '시카고': 'USD', '워싱턴 D.C.': 'USD',
      '런던': 'GBP', '도쿄': 'JPY', '베를린': 'EUR', '서울': 'KRW', '부산': 'KRW'
    };

    // Admin Modal Component
    function AdminModal({ adminData, setAdminData, onClose, onForceUpdate }) {
      const [jsonText, setJsonText] = useState(JSON.stringify(adminData, null, 2));
      const [error, setError] = useState('');

      const handleSave = () => {
        try {
          const parsed = JSON.parse(jsonText);
          setAdminData(parsed);
          // 저장 시 캐시 무효화 및 새 데이터 세팅
          sessionStorage.setItem('expatValueAdminData', JSON.stringify(parsed));
          onClose();
        } catch (e) {
          setError('JSON 형식이 올바르지 않습니다.');
        }
      };

      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
          <div className="bg-white rounded-xl shadow-2xl w-[700px] max-w-[95%] flex flex-col overflow-hidden max-h-[90vh]">
            <div className="p-5 bg-hcNavy text-white flex justify-between items-center">
              <div className="flex items-center gap-2">
                <div className="w-5 h-5"><IconDatabase /></div>
                <h2 className="text-lg font-bold">Admin Setting (공공 데이터 동기화 관리)</h2>
              </div>
              <button onClick={onClose} className="hover:bg-white/20 p-1 rounded transition-colors">
                <div className="w-5 h-5"><IconX /></div>
              </button>
            </div>
            <div className="p-6 flex-1 flex flex-col gap-4 overflow-y-auto">
              <div className="flex justify-between items-start">
                <p className="text-sm text-hcGray-800 flex-1">
                  <strong>미 국무부(U.S. DOS)</strong> 데이터 구조와 <strong>e-나라지표 환율</strong>을 관리합니다. <br/>
                  자동 업데이트가 실패했거나, 수동으로 최신 버전(Override)을 적용하고 싶을 때 직접 편집하세요.
                </p>
                <button 
                  onClick={onForceUpdate}
                  className="px-4 py-2 bg-hcGray-100 hover:bg-hcGray-200 border border-hcGray-200 text-hcGray-800 rounded-md text-sm font-bold flex items-center gap-2 transition-colors"
                >
                  <div className="w-4 h-4"><IconRefresh /></div> API 강제 동기화 시도
                </button>
              </div>
              
              <textarea
                className="w-full h-[400px] p-4 bg-hcGray-50 border border-hcGray-200 rounded-md font-mono text-sm focus:outline-none focus:ring-2 focus:ring-hcBlue"
                value={jsonText}
                onChange={(e) => {
                  setJsonText(e.target.value);
                  setError('');
                }}
              />
              {error && <p className="text-red-500 text-sm font-bold">{error}</p>}
            </div>
            <div className="p-4 bg-hcGray-50 border-t border-hcGray-100 flex justify-end gap-3">
              <button onClick={onClose} className="px-5 py-2 bg-white border border-hcGray-200 text-hcGray-800 rounded-md font-bold hover:bg-hcGray-100">취소</button>
              <button onClick={handleSave} className="px-5 py-2 bg-hcBlue text-white rounded-md font-bold flex items-center gap-2 hover:bg-hcNavy">
                <div className="w-4 h-4"><IconSave /></div> 데이터 강제 업데이트 (Override)
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Sidebar Component
    function Sidebar({ formData, onChange, onSalaryChange, onCalculate, onReset, onOpenAdmin, isDataLoading }) {
      return (
        <div className="h-full bg-white flex flex-col border-r border-hcGray-100 relative">
          {isDataLoading && (
            <div className="absolute inset-0 bg-white/50 backdrop-blur-sm z-20 flex flex-col items-center justify-center">
              <div className="w-10 h-10 border-4 border-hcGray-200 border-t-hcBlue rounded-full animate-spin mb-3"></div>
              <p className="text-sm font-bold text-hcNavy">공공 데이터 동기화 중...</p>
            </div>
          )}
          <div className="p-6 bg-hcNavy text-white flex justify-between items-start">
            <div>
              <div className="flex items-center gap-2 mb-2">
                <div className="w-6 h-6 text-blue-300"><IconCalculator /></div>
                <h1 className="text-2xl font-bold tracking-tight">ExpatValue AI</h1>
              </div>
              <p className="text-sm text-blue-200/80">주재원 해외 생계비 산정 시스템</p>
            </div>
            <button onClick={onOpenAdmin} className="p-2 bg-white/10 hover:bg-white/20 rounded-md transition-colors text-white" title="Admin Settings">
              <div className="w-5 h-5"><IconSettings /></div>
            </button>
          </div>

          <div className="flex-1 overflow-y-auto p-6 space-y-8">
            <div className="space-y-4">
              <h3 className="text-sm font-bold text-hcNavy flex items-center gap-2 border-b border-hcGray-100 pb-2">
                <div className="w-4 h-4"><IconMapPin /></div> 파견국 및 부임국
              </h3>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-semibold text-hcGray-800 mb-1">Home (파견국)</label>
                  <select name="homeCity" value={formData.homeCity} onChange={onChange} className="w-full p-2.5 bg-hcGray-50 border border-hcGray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-hcBlue">
                    <option value="서울">서울</option>
                    <option value="부산">부산</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-hcGray-800 mb-1">Host (부임도시)</label>
                  <select name="hostCity" value={formData.hostCity} onChange={onChange} className="w-full p-2.5 bg-hcGray-50 border border-hcGray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-hcBlue">
                    <option value="">선택하세요</option>
                    <option value="워싱턴 D.C.">미국 워싱턴 D.C.</option>
                    <option value="뉴욕">미국 뉴욕</option>
                    <option value="로스앤젤레스">미국 LA</option>
                    <option value="시카고">미국 시카고</option>
                    <option value="런던">영국 런던</option>
                    <option value="도쿄">일본 도쿄</option>
                    <option value="베를린">독일 베를린</option>
                  </select>
                </div>
              </div>
            </div>

            <div className="space-y-4">
              <h3 className="text-sm font-bold text-hcNavy flex items-center gap-2 border-b border-hcGray-100 pb-2">
                <div className="w-4 h-4"><IconCoins /></div> 국내 기본연봉 (KRW)
              </h3>
              <div className="relative">
                <input type="text" name="baseSalary" value={formData.baseSalary} onChange={onSalaryChange} placeholder="0" className="w-full p-3 pr-10 bg-white border border-hcGray-200 rounded-md text-right font-bold text-lg focus:outline-none focus:ring-2 focus:ring-hcBlue shadow-inner" />
                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-hcGray-800 font-medium">원</span>
              </div>
            </div>

            <div className="space-y-4">
              <h3 className="text-sm font-bold text-hcNavy flex items-center gap-2 border-b border-hcGray-100 pb-2">
                <div className="w-4 h-4"><IconUsers /></div> 부양 가족 형태
              </h3>
              <div className="flex gap-4">
                <label className={`flex-1 flex items-center justify-center gap-2 p-3 border rounded-md cursor-pointer text-sm font-medium ${formData.familyType === 'single' ? 'bg-hcNavy text-white border-hcNavy' : 'bg-white text-hcGray-800 border-hcGray-200 hover:bg-hcGray-50'}`}>
                  <input type="radio" name="familyType" value="single" checked={formData.familyType === 'single'} onChange={onChange} className="hidden" />
                  단신 부임
                </label>
                <label className={`flex-1 flex items-center justify-center gap-2 p-3 border rounded-md cursor-pointer text-sm font-medium ${formData.familyType === 'family' ? 'bg-hcNavy text-white border-hcNavy' : 'bg-white text-hcGray-800 border-hcGray-200 hover:bg-hcGray-50'}`}>
                  <input type="radio" name="familyType" value="family" checked={formData.familyType === 'family'} onChange={onChange} className="hidden" />
                  가족 동반
                </label>
              </div>
            </div>

            <div className="space-y-4 opacity-70">
              <h3 className="text-sm font-bold text-hcNavy flex items-center gap-2 border-b border-hcGray-100 pb-2">
                <div className="w-4 h-4"><IconGlobe /></div> 자동 로드 지수 및 환율 (읽기전용)
              </h3>
              <div className="space-y-3">
                <div className="flex items-center gap-3">
                  <label className="w-24 text-xs font-semibold text-hcGray-800">Home Index</label>
                  <input type="text" readOnly value={formData.homeCol} className="flex-1 p-2 bg-hcGray-100 border border-hcGray-200 rounded-md text-sm text-right cursor-not-allowed" />
                </div>
                <div className="flex items-center gap-3">
                  <label className="w-24 text-xs font-semibold text-hcGray-800">Host Index</label>
                  <input type="text" readOnly value={formData.hostCol} className="flex-1 p-2 bg-hcGray-100 border border-hcGray-200 rounded-md text-sm text-right cursor-not-allowed" />
                </div>
                <div className="flex items-center gap-3">
                  <label className="w-24 text-xs font-semibold text-hcGray-800">연평균 환율</label>
                  <input type="text" readOnly value={formData.exchangeRate} className="flex-1 p-2 bg-hcGray-100 border border-hcGray-200 rounded-md text-sm text-right cursor-not-allowed" />
                </div>
              </div>
            </div>
          </div>
          
          <div className="p-6 bg-white border-t border-hcGray-100 flex gap-3">
            <button onClick={onReset} disabled={isDataLoading} className="flex-1 py-3 bg-white border border-hcGray-200 text-hcGray-800 rounded-md font-bold text-sm hover:bg-hcGray-50 transition-colors disabled:opacity-50">
              초기화
            </button>
            <button onClick={onCalculate} disabled={isDataLoading} className="flex-[2] py-3 bg-hcBlue text-white rounded-md font-bold text-sm hover:bg-hcNavy transition-colors shadow-sm disabled:opacity-50">
              생계비 산정 실행
            </button>
          </div>
        </div>
      );
    }

    // Dashboard Component
    function Dashboard({ formData, result, adminData, isDataLoading }) {
      const isReady = result !== null;

      const formatCurrency = (val, currency) => {
        if (val === undefined || val === null) return '0';
        return new Intl.NumberFormat(currency === 'KRW' ? 'ko-KR' : 'en-US', {
          style: 'currency',
          currency: currency || 'KRW',
          maximumFractionDigits: currency === 'KRW' ? 0 : 2
        }).format(val);
      };

      const formatNumber = (val) => {
        return new Intl.NumberFormat('ko-KR', { maximumFractionDigits: 2 }).format(val);
      }

      if (isDataLoading) {
        return (
          <div className="p-8 h-full bg-hcGray-50 flex flex-col overflow-y-auto">
            <div className="h-10 bg-hcGray-200 rounded w-1/3 mb-4 skeleton"></div>
            <div className="h-4 bg-hcGray-200 rounded w-2/3 mb-12 skeleton"></div>
            
            <div className="bg-white rounded-xl shadow-sm border border-hcGray-100 p-8 mb-8 skeleton">
               <div className="h-6 bg-hcGray-200 rounded w-1/4 mb-4"></div>
               <div className="h-12 bg-hcGray-200 rounded w-1/2"></div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-hcGray-100 p-8 skeleton flex-1">
               <div className="h-6 bg-hcGray-200 rounded w-1/4 mb-8"></div>
               <div className="space-y-4">
                 <div className="h-8 bg-hcGray-100 rounded w-full"></div>
                 <div className="h-8 bg-hcGray-100 rounded w-full"></div>
                 <div className="h-8 bg-hcGray-100 rounded w-full"></div>
               </div>
            </div>
          </div>
        );
      }

      return (
        <div className="p-8 h-full bg-hcGray-50 flex flex-col overflow-y-auto relative pb-24">
          <header className="mb-8">
            <h2 className="text-3xl font-bold text-hcNavy tracking-tight">해외 생계비 산정 결과</h2>
            <p className="text-hcGray-800 mt-2 text-sm">
              MERCER 기반 SI 산출 및 미 국무부(U.S. DOS) 기반 공공 물가 지수 동기화 결과
            </p>
          </header>

          <div className="bg-white rounded-xl shadow-sm border border-hcGray-100 overflow-hidden mb-8 transition-all duration-300">
            <div className="bg-gradient-to-r from-hcNavy to-hcBlue p-6 flex justify-between items-center text-white">
              <div>
                <h3 className="text-lg font-medium opacity-90">최종 산출 해외 생계비 (현지통화)</h3>
                <div className="flex items-center gap-3 mt-2">
                  <span className="text-5xl font-bold tracking-tight">
                    {isReady ? formatCurrency(result.finalLocalCurrencyAmount, result.currency) : '-'}
                  </span>
                  {isReady && result.currency !== 'KRW' && (
                    <span className="bg-white/20 px-3 py-1 rounded-full text-sm font-semibold mt-2">
                      {result.currency}
                    </span>
                  )}
                </div>
              </div>
              <div className="hidden md:flex items-center gap-4 bg-white/10 p-4 rounded-lg backdrop-blur-sm">
                <div className="text-center">
                  <div className="text-xs opacity-80 mb-1">{formData.homeCity || 'Home'} (Index)</div>
                  <div className="font-semibold text-lg">{isReady ? result.homeCol : formData.homeCol || '-'}</div>
                </div>
                <div className="w-5 h-5 opacity-50"><IconArrowRight /></div>
                <div className="text-center">
                  <div className="text-xs opacity-80 mb-1">{formData.hostCity || 'Host'} (Index)</div>
                  <div className="font-semibold text-lg">{isReady ? result.hostCol : formData.hostCol || '-'}</div>
                </div>
              </div>
            </div>
            
            <div className="p-6 bg-white flex items-center justify-between border-b border-hcGray-100">
              <div className="flex items-center gap-2 text-hcGray-800">
                <div className="w-4 h-4 text-hcBlue"><IconInfo /></div>
                <span className="text-sm font-medium">환산 전 원화 생계비 (가족/COL 반영): </span>
                <span className="text-lg font-bold text-hcNavy">
                  {isReady ? formatCurrency(result.overseasLivingCostKRW, 'KRW') : '-'}
                </span>
              </div>
              {isReady && (
                <div className="text-xs font-medium text-hcGray-800 px-3 py-1 bg-hcGray-50 rounded-md border border-hcGray-200">
                  직전년도 연평균 환율 적용: 1 {result.currency} = {formatNumber(result.exchangeRate)} KRW
                </div>
              )}
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-hcGray-100 flex-1 overflow-hidden flex flex-col mb-8">
            <div className="p-5 border-b border-hcGray-100 flex items-center gap-2 bg-hcGray-50/50">
              <div className="w-5 h-5 text-hcNavy"><IconFileText /></div>
              <h3 className="text-lg font-bold text-hcNavy">산출 근거 (수학적 공식 투명 공개)</h3>
            </div>
            
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-hcGray-50 text-hcGray-800 font-semibold border-b border-hcGray-200 text-xs">
                  <tr>
                    <th className="px-6 py-4 w-1/4">항목</th>
                    <th className="px-6 py-4 w-1/2">적용 수식 (Formula)</th>
                    <th className="px-6 py-4 text-right w-1/4">산출액 / 비율</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-hcGray-100 text-hcGray-900">
                  <tr className="hover:bg-hcGray-50/50 transition-colors">
                    <td className="px-6 py-4 font-bold flex items-center gap-2">
                      <span className="w-1.5 h-1.5 rounded-full bg-hcBlue block"></span>
                      SI 비율 적용값
                    </td>
                    <td className="px-6 py-4 text-hcGray-800 font-mono text-xs bg-hcGray-50/30">
                      {isReady ? `기본연봉(${formatNumber(result.baseSalary)}) × 보간 적용 SI비율(${result.siPercentage.toFixed(2)}%)` : '-'}
                    </td>
                    <td className="px-6 py-4 text-right font-bold text-hcBlue">
                      {isReady ? formatCurrency(result.baseSIAmount, 'KRW') : '-'}
                    </td>
                  </tr>
                  <tr className="hover:bg-hcGray-50/50 transition-colors">
                    <td className="px-6 py-4 font-bold flex items-center gap-2">
                      <span className="w-1.5 h-1.5 rounded-full bg-blue-400 block"></span>
                      가족 가산 내역
                    </td>
                    <td className="px-6 py-4 text-hcGray-800 font-mono text-xs bg-hcGray-50/30">
                      {isReady ? `단신 SI금액 × 가산율(${result.familyMultiplier})` : '-'}
                    </td>
                    <td className="px-6 py-4 text-right font-bold text-blue-600">
                      {isReady ? formatCurrency(result.finalSIAmount, 'KRW') : '-'}
                    </td>
                  </tr>
                  <tr className="hover:bg-hcGray-50/50 transition-colors">
                    <td className="px-6 py-4 font-bold flex items-center gap-2">
                      <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 block"></span>
                      서울 대비 상대 물가비율
                    </td>
                    <td className="px-6 py-4 text-hcGray-800 font-mono text-xs bg-hcGray-50/30">
                      {isReady ? `(Host COL(${result.hostCol}) ÷ Seoul COL(${result.homeCol})) × 100` : '-'}
                    </td>
                    <td className="px-6 py-4 text-right font-bold text-indigo-600">
                      {isReady ? `${formatNumber(result.relativeColPercentage)} %` : '-'}
                    </td>
                  </tr>
                  <tr className="hover:bg-hcGray-50/50 transition-colors bg-purple-50/10">
                    <td className="px-6 py-4 font-bold flex items-center gap-2">
                      <span className="w-1.5 h-1.5 rounded-full bg-purple-400 block"></span>
                      최종 환율 및 환산
                    </td>
                    <td className="px-6 py-4 text-hcGray-800 font-mono text-xs bg-purple-50/20">
                      {isReady ? `(가족 가산 내역 × 상대 물가비율) ÷ 환율(${formatNumber(result.exchangeRate)})` : '-'}
                    </td>
                    <td className="px-6 py-4 text-right font-black text-purple-700 text-base">
                      {isReady ? formatCurrency(result.finalLocalCurrencyAmount, result.currency) : '-'}
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            
            {!isReady && (
              <div className="flex-1 flex flex-col items-center justify-center p-8 text-hcGray-800">
                <div className="w-12 h-12 text-hcGray-200 mb-3"><IconDollarSign /></div>
                <p className="font-medium">모든 정보를 입력한 후 '생계비 산정 실행' 버튼을 클릭해주세요.</p>
                <p className="text-sm mt-1 text-hcGray-800">본 지수는 서울(Seoul)을 기준(100)으로 자동 재가공됩니다.</p>
              </div>
            )}
          </div>

          {/* 데이터 거버넌스 정보 영역 */}
          {adminData && (
            <div className="absolute bottom-0 left-0 w-full p-4 bg-hcGray-100 border-t border-hcGray-200 flex justify-between items-center text-xs text-hcGray-800">
              <div>
                <strong>데이터 업데이트 정보</strong>
                <span className="mx-2">|</span>
                <span className="text-hcBlue font-medium">본 지수는 미 국무부(U.S. State Dept.)의 Retail Price Index를 서울 기준으로 재가공하여 산출되었습니다.</span>
              </div>
              <div className="flex gap-4 text-right">
                <div>
                  <span className="opacity-70">U.S. DOS Index:</span> <strong className="ml-1">{adminData.colData.meta.version}</strong>
                  <a href={adminData.colData.meta.sourceUrl} target="_blank" className="ml-2 underline text-hcBlue">Source</a>
                </div>
                <div>
                  <span className="opacity-70">Exchange Rates:</span> <strong className="ml-1">{adminData.exchangeData.meta.lastUpdated}</strong>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // App Component
    function App() {
      const [adminData, setAdminData] = useState(null);
      const [isDataLoading, setIsDataLoading] = useState(true);
      const [isAdminOpen, setIsAdminOpen] = useState(false);

      const [formData, setFormData] = useState({
        homeCountry: '대한민국',
        homeCity: '서울',
        hostCountry: '',
        hostCity: '',
        familyType: 'single',
        baseSalary: '',
        homeCol: '',
        hostCol: '',
        exchangeRate: '',
        currency: ''
      });

      const [result, setResult] = useState(null);

      // Data Fetching Logic (Simulation with Axios error fallback)
      const fetchExternalData = async (force = false) => {
        setIsDataLoading(true);
        
        try {
          if (!force) {
            const cached = sessionStorage.getItem('expatValueAdminData');
            if (cached) {
              setAdminData(JSON.parse(cached));
              setIsDataLoading(false);
              return;
            }
          }

          // 1. 공공 데이터 API 호출 흉내내기 (실제로는 Timeout 후 모의 데이터 로드)
          await new Promise(resolve => setTimeout(resolve, 1500)); // 스켈레톤 UI를 보여주기 위한 딜레이

          // 실제 한국은행/미 국무부 API 호출부 (지금은 axios get 시뮬레이션 후 catch로 fallback)
          let bokData, dosData;
          try {
            // 의도적으로 실패하는 API 호출 구조
            const res = await axios.get('https://api.bok.or.kr/fake-ecos-endpoint', { timeout: 500 });
            bokData = res.data;
          } catch(e) {
            console.log("BOK ECOS API Failed, falling back to JSON mock.");
            bokData = EXCHANGE_RATE_MOCK;
          }

          dosData = STATE_DEPT_DATA_MOCK;

          const newData = {
            colData: dosData,
            exchangeData: bokData,
            cityCurrency: CURRENCY_MAP
          };

          sessionStorage.setItem('expatValueAdminData', JSON.stringify(newData));
          setAdminData(newData);

        } catch(error) {
          console.error("데이터 동기화 실패:", error);
          alert("데이터를 불러오는데 실패했습니다. 관리자 모드에서 확인해주세요.");
        } finally {
          setIsDataLoading(false);
        }
      };

      useEffect(() => {
        fetchExternalData();
      }, []);

      // 도시 선택 시 자동 완성 (서울=100 재가공 로직 포함)
      useEffect(() => {
        if (!adminData) return;

        const indices = adminData.colData.indices;
        const rates = adminData.exchangeData.rates;
        const seoulBase = indices['서울'] || 115.0; // U.S DOS 상의 서울 지수

        let hostColAdjusted = '';
        let exchangeRateValue = '';
        let currency = '';

        if (formData.hostCity && indices[formData.hostCity]) {
          const rawCol = indices[formData.hostCity];
          // U.S DOS 데이터를 서울=100 기준으로 자동 변환: (Host / Seoul) * 100
          hostColAdjusted = ((rawCol / seoulBase) * 100).toFixed(2);
          currency = adminData.cityCurrency[formData.hostCity];
          exchangeRateValue = rates[currency] ? rates[currency].toString() : '1';
        }

        setFormData(prev => ({
          ...prev,
          homeCol: '100.00', // Home은 항상 서울(100.00)으로 고정되어 변환됨
          hostCol: hostColAdjusted,
          exchangeRate: exchangeRateValue,
          currency: currency || 'KRW'
        }));
        
      }, [formData.hostCity, adminData]);

      const calculateSI = (baseSalary) => {
        if (baseSalary <= 50000000) return 50.0;
        if (baseSalary >= 200000000) return 35.0;

        let lowerBound, upperBound, lowerPct, upperPct;

        if (baseSalary < 100000000) {
          lowerBound = 50000000; upperBound = 100000000;
          lowerPct = 50.0; upperPct = 44.56;
        } else if (baseSalary < 150000000) {
          lowerBound = 100000000; upperBound = 150000000;
          lowerPct = 44.56; upperPct = 40.0;
        } else {
          lowerBound = 150000000; upperBound = 200000000;
          lowerPct = 40.0; upperPct = 35.0;
        }

        const ratio = (baseSalary - lowerBound) / (upperBound - lowerBound);
        return lowerPct - (ratio * (lowerPct - upperPct));
      };

      const handleCalculate = () => {
        if (!formData.baseSalary || !formData.homeCol || !formData.hostCol || !formData.exchangeRate) {
          alert('모든 필수 입력값을 채워주세요.');
          return;
        }

        const baseSalaryNum = parseInt(formData.baseSalary.replace(/,/g, ''), 10) || 0;
        const homeColNum = parseFloat(formData.homeCol) || 100;
        const hostColNum = parseFloat(formData.hostCol) || 100;
        const exchangeRateNum = parseFloat(formData.exchangeRate) || 1;
        
        const siPercentage = calculateSI(baseSalaryNum);
        const baseSIAmount = baseSalaryNum * (siPercentage / 100);

        const familyMultiplier = formData.familyType === 'family' ? 1.15 : 1.0;
        const finalSIAmount = baseSIAmount * familyMultiplier;

        const relativeColPercentage = (hostColNum / homeColNum) * 100;
        const overseasLivingCostKRW = finalSIAmount * (relativeColPercentage / 100);

        const finalLocalCurrencyAmount = overseasLivingCostKRW / exchangeRateNum;

        setResult({
          baseSalary: baseSalaryNum,
          siPercentage: siPercentage,
          baseSIAmount: baseSIAmount,
          familyMultiplier: familyMultiplier,
          finalSIAmount: finalSIAmount,
          homeCol: homeColNum.toFixed(2),
          hostCol: hostColNum.toFixed(2),
          relativeColPercentage: relativeColPercentage,
          overseasLivingCostKRW: overseasLivingCostKRW,
          exchangeRate: exchangeRateNum,
          currency: formData.currency || 'KRW',
          finalLocalCurrencyAmount: finalLocalCurrencyAmount
        });
      };

      const handleReset = () => {
        setFormData({
          homeCountry: '대한민국',
          homeCity: '서울',
          hostCountry: '',
          hostCity: '',
          familyType: 'single',
          baseSalary: '',
          homeCol: '100.00',
          hostCol: '',
          exchangeRate: '',
          currency: ''
        });
        setResult(null);
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({
          ...prev,
          [name]: value
        }));
      };

      const handleSalaryChange = (e) => {
        let val = e.target.value.replace(/[^0-9]/g, '');
        if (val) {
          val = parseInt(val, 10).toLocaleString('ko-KR');
        }
        setFormData(prev => ({
          ...prev,
          baseSalary: val
        }));
      };

      return (
        <div className="flex h-screen bg-hcGray-50">
          <div className="w-[30%] min-w-[350px] max-w-[420px] h-full shadow-lg z-10">
            <Sidebar 
              formData={formData} 
              onChange={handleInputChange} 
              onSalaryChange={handleSalaryChange} 
              onCalculate={handleCalculate} 
              onReset={handleReset} 
              onOpenAdmin={() => setIsAdminOpen(true)}
              isDataLoading={isDataLoading}
            />
          </div>
          <div className="flex-1 h-full relative">
            <Dashboard 
              formData={formData} 
              result={result} 
              adminData={adminData} 
              isDataLoading={isDataLoading}
            />
          </div>
          {isAdminOpen && (
            <AdminModal 
              adminData={adminData} 
              setAdminData={setAdminData} 
              onClose={() => setIsAdminOpen(false)} 
              onForceUpdate={() => {
                setIsAdminOpen(false);
                fetchExternalData(true);
              }}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
